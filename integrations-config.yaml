# 编排层集成配置
# Orchestrator Integration Configuration

obsidian:
  enabled: true
  vault_path: "C:\\Users\\1978w\\Documents\\meetings"  # 会议笔记目录（普通文件夹）
  notes_subdir: ""                                        # 空表示直接在 vault_path 下查找
  auto_sync: true
  supported_formats:
    - ".md"
    - ".txt"

database:
  enabled: false
  type: "postgresql"
  host: ""
  port: 5432
  database: ""
  user: ""
  password: ""
  read_only: true
  timeout_seconds: 30
  allowed_tables:
    - "customers"
    - "subscriptions"
    - "configs"
    - "usage_logs"

admin_api:
  enabled: false
  base_url: ""
  api_key: ""
  allowed_actions:
    - "credit_recharge"
    - "unblock_account"
    - "extend_trial"
    - "update_config"
  rate_limit_per_minute: 10

context_manager:
  max_context_tokens: 50000
  priority_sources:
    - obsidian_meetings
    - database_customer_config
    - task_history
    - successful_patterns
  context_window: "7d"
  summary_enabled: true

security:
  agent_no_database_write: true
  agent_no_admin_api: true
  agent_no_customer_pii: true
  min_context_principle: true
  log_all_access: true
